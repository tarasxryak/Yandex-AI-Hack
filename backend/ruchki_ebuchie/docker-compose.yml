services:
  ruchki:
    build:
      context: .
    image: ruchki-ebuchie:local
    env_file:
      - .env
    environment:
      PORT: "8080"
      SQLITE_PATH: /data/sqlite.db
      DOCS_PARSER_URL: http://docs-parser:8080
    ports:
      - "8080:8080"
    volumes:
      - ruchki-data:/data
    depends_on:
      docs-parser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  docs-parser:
    build:
      context: ../docs_parsing
    image: docs-parser:local
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  ruchki-data:
